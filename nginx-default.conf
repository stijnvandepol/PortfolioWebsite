# Hardened server-config voor het portfolio (vervangt de default server-block).
# Geplaatst in /etc/nginx/conf.d/default.conf via de Dockerfile.
server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'" always;

    # SPA-achtige fallback (de app is één document).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # App-code + documenten: altijd revalideren zodat een deploy direct doorkomt.
    # (Geen build-stap met content-hashing, dus 'immutable' zou oude code 30 dagen vastpinnen.)
    location ~* \.(html|css|js|mjs|json|pdf)$ {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Statische media (zelden gewijzigd): lang cachen.
    location ~* \.(png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;
}
